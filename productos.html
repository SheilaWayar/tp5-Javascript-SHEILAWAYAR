<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TP5 - Filtro de Productos</title>
    <style>
        body { font-family: Arial; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .filtros { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .filtros label { display: flex; flex-direction: column; gap: 5px; }
        #contenedor-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .tarjeta { border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        .sin-stock { opacity: 0.5; }
        .precio { font-size: 1.2em; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Sistema de Filtrado de Productos</h1>
    
    <div class="filtros">
        <label>
            Categoría:
            <select id="filtro-categoria">
                <option value="todas">Todas</option>
            </select>
        </label>
        
        <label>
            Precio máximo: $<span id="valor-precio">5000</span>
            <input type="range" id="filtro-precio" min="0" max="5000" value="5000" step="100">
        </label>
        
        <label>
            <input type="checkbox" id="filtro-stock"> Solo en stock
        </label>
        
        <label>
            Buscar por nombre:
            <input type="text" id="filtro-nombre" placeholder="Escribí para buscar...">
        </label>
    </div>

    <div id="contenedor-productos"></div>

    <script src="js/productos.js"></script>
</body>
</html>
