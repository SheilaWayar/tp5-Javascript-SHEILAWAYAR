<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TP5 - Filtro de Productos</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <h1>Sistema de Filtrado de Productos</h1>
    
    <div class="filtros">
        <label>
            Categoría:
            <select id="filtro-categoria">
                <option value="todas">Todas</option>
            </select>
        </label>
        
        <label>
            Precio máximo: $<span id="valor-precio">5000</span>
            <input type="range" id="filtro-precio" min="0" max="5000" value="5000" step="100">
        </label>
        
        <label>
            <input type="checkbox" id="filtro-stock"> Solo en stock
        </label>
        
        <label>
            Buscar por nombre:
            <input type="text" id="filtro-nombre" placeholder="Escribí para buscar...">
        </label>
    </div>

    <div id="contenedor-productos"></div>

    <script src="js/productos.js"></script>
</body>
</html>
