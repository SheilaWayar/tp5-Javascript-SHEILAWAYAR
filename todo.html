<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TP5 - To-Do App</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="container">
        <h1>Mi Lista de Tareas</h1>
        
        <!-- (a) Formulario con input + botón -->
        <form id="form-tarea">
            <input type="text" id="input-tarea" placeholder="Escribí una tarea..." autocomplete="off">
            <button type="submit">Agregar</button>
        </form>

        <!-- (d) Contador de tareas pendientes -->
        <div id="contador">Tareas pendientes: 0</div>
        
        <ul id="lista-tareas"></ul>
    </div>

    <script src="js/todo.js"></script>
</body>
</html>
